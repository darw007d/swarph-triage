name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          # package + the fastapi extra (router tests) + test deps; httpx for TestClient
          pip install -e ".[fastapi]" pytest pytest-asyncio httpx
      - name: Run tests
        run: pytest -q
        # The 7 postgres-arm tests skip unless SWARPH_TRIAGE_TEST_PG_URL is set;
        # sqlite runs for real on every matrix entry.
